<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport"
              content="width=device-width, user-scalable=no, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0">
        <meta http-equiv="X-UA-Compatible" content="ie=edge">
        <title>CGIT Compare</title>
        <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.4.1/css/bootstrap.min.css" integrity="sha384-Vkoo8x4CGsO3+Hhxv8T/Q5PaXtkKtu6ug5TOeNV6gBiFeWPGFN9MuhOf23Q9Ifjh" crossorigin="anonymous">
        <link id="highlight-theme" rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/9.9.0/styles/github.min.css" />
        <!--diff2html-css-->
        <!--diff2html-js-ui-->
        <style>
            body { background: #ffffff; color: #212529; }
            .cgit-header { background: #f8f9fa; border-bottom: 1px solid #dee2e6; }
            .branch-tag { color: #fff; background: #343a40; padding: 2px 10px; border-radius: 4px; }
            .vs-tag { color: #6c757d; }
            #theme-toggle {
                cursor: pointer; font-size: 1.3rem; background: none;
                border: 1px solid #adb5bd; border-radius: 6px; padding: 2px 10px; line-height: 1.6;
            }
        </style>
        <style id="dark-overrides"></style>
        <script>
            var darkMode = (localStorage.getItem('cgit-theme') === 'dark');

            var DARK_CSS = [
                'body { background: #1e1e1e !important; color: #d4d4d4 !important; }',
                '.cgit-header { background: #252526 !important; border-bottom-color: #3c3c3c !important; }',
                '.branch-tag { background: #0e639c !important; }',
                '#theme-toggle { border-color: #555 !important; color: #d4d4d4 !important; }',
                'a { color: #9cdcfe !important; }',
                '.d2h-wrapper, .d2h-file-list-wrapper { background: #1e1e1e !important; }',
                '.d2h-file-wrapper { background: #1e1e1e !important; border-color: #3c3c3c !important; }',
                '.d2h-file-header { background: #252526 !important; border-bottom-color: #3c3c3c !important; color: #d4d4d4 !important; }',
                '.d2h-file-name, .d2h-file-name a { color: #9cdcfe !important; }',
                '.d2h-file-list { background: #252526 !important; border-color: #3c3c3c !important; }',
                '.d2h-file-list li { border-bottom-color: #3c3c3c !important; }',
                '.d2h-code-linenumber, .d2h-code-side-linenumber { background: #252526 !important; border-color: #3c3c3c !important; color: #858585 !important; }',
                '.d2h-code-line, .d2h-code-side-line { background: #1e1e1e !important; color: #d4d4d4 !important; }',
                '.d2h-cntx td { background: #1e1e1e !important; }',
                '.d2h-cntx .d2h-code-linenumber, .d2h-cntx .d2h-code-side-linenumber { background: #1e1e1e !important; color: #858585 !important; }',
                '.d2h-ins td, .d2h-ins .d2h-code-line, .d2h-ins .d2h-code-side-line { background: #1a3a1a !important; }',
                '.d2h-ins .d2h-code-linenumber, .d2h-ins .d2h-code-side-linenumber { background: #1e3a1e !important; border-color: #2a5a2a !important; color: #4ec94e !important; }',
                '.d2h-del td, .d2h-del .d2h-code-line, .d2h-del .d2h-code-side-line { background: #3a1a1a !important; }',
                '.d2h-del .d2h-code-linenumber, .d2h-del .d2h-code-side-linenumber { background: #3a1e1e !important; border-color: #5a2a2a !important; color: #f44747 !important; }',
                '.d2h-info td, .d2h-info .d2h-code-linenumber, .d2h-info .d2h-code-side-linenumber { background: #252526 !important; color: #858585 !important; border-color: #3c3c3c !important; }',
                '.d2h-tag { background: #0e639c !important; color: #fff !important; border-color: #0e639c !important; }',
                'ins.d2h-ins { background: #2a5a2a !important; }',
                'del.d2h-del { background: #5a2a2a !important; }'
            ].join('\n');

            function applyTheme(isDark) {
                var el = document.getElementById('dark-overrides');
                var btn = document.getElementById('theme-toggle');
                var hl = document.getElementById('highlight-theme');
                el.textContent = isDark ? DARK_CSS : '';
                btn.textContent = isDark ? '☀️' : '🌙';
                hl.href = isDark
                    ? 'https://cdnjs.cloudflare.com/ajax/libs/highlight.js/9.9.0/styles/monokai-sublime.min.css'
                    : 'https://cdnjs.cloudflare.com/ajax/libs/highlight.js/9.9.0/styles/github.min.css';
                localStorage.setItem('cgit-theme', isDark ? 'dark' : 'light');
                darkMode = isDark;
            }

            function toggleTheme() { applyTheme(!darkMode); }

            document.addEventListener('DOMContentLoaded', function() {
                if (darkMode) applyTheme(true);

                try {
                    var targetElement = document.getElementById('diff');
                    var diff2htmlUi = new Diff2HtmlUI(targetElement);
                    //diff2html-fileListToggle
                    //diff2html-synchronisedScroll
                    //diff2html-highlightCode
                } catch(e) {}
            });
        </script>
    </head>
    <body>

        <div class="cgit-header py-2 px-3 d-flex align-items-center justify-content-between">
            <h2 class="mb-0">
                <div class="d-flex align-items-center" style="gap: 12px;">
                    <span class="branch-tag">!!OTHERBRANCH!!</span>
                    <span class="vs-tag">vs.</span>
                    <span class="branch-tag">!!BRANCH!!</span>
                </div>
            </h2>
            <button id="theme-toggle" onclick="toggleTheme()" title="Toggle dark/light mode">🌙</button>
        </div>

        <div id="diff">
            <!--diff2html-diff-->
        </div>

        <p class="text-center mt-3" style="font-size: 0.85rem; color: #6c757d;">
            Using <a href="https://github.com/rtfpessoa/diff2html-cli">diff2html by rtfpessoa</a>
        </p>

        <script src="https://code.jquery.com/jquery-3.4.1.slim.min.js" integrity="sha384-J6qa4849blE2+poT4WnyKhv5vZF5SrPo0iEjwBvKU7imGFAV0wwj1yYfoRSJoZ+n" crossorigin="anonymous"></script>
        <script src="https://cdn.jsdelivr.net/npm/popper.js@1.16.0/dist/umd/popper.min.js" integrity="sha384-Q6E9RHvbIyZFJoft+2mJbHaEWldlvI9IOYy5n3zV9zzTtmI3UksdQRVvoxMfooAo" crossorigin="anonymous"></script>
        <script src="https://stackpath.bootstrapcdn.com/bootstrap/4.4.1/js/bootstrap.min.js" integrity="sha384-wfSDF2E50Y2D1uUdj0O3uMBJnjuUD4Ih7YwaYd1iqfktj0Uod8GCExl3Og8ifwB6" crossorigin="anonymous"></script>
    </body>
</html>
