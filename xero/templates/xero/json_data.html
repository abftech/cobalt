<div class="card mt-3">
    <div class="card-header">
        <h4>Results</h4>
    </div>
    <div class="card-body">

        {% if json_data.Contacts %}
            <p class="mb-2"><strong>Count: {{ json_data.Contacts|length }}</strong></p>
        {% endif %}

        <script id="xero-json-data" type="application/json">{{ json_data_str }}</script>
        {% include "utils/json_tree.html" with data_script_id="xero-json-data" container_id="xero-json-tree" %}

    </div>
</div>
