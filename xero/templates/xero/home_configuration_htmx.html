{% load humanize %}

<div class="card mb-4">
    <div class="card-header text-white bg-success">
        <h2>Configuration</h2>
    </div>
    <div class="card-body">
        <div class="table-responsive">
            <table class="table">
                <tr>
                    <td>Tenant ID</td>
                    <td>{{ xero.tenant_id }}</td>
                </tr>
                <tr>
                    <td>Last Characters of Access Code</td>
                    <td>...{{ xero.access_token|slice:"-5:" }}</td>
                </tr>
                <tr>
                    <td>Access Token Expiry</td>
                    <td>{{ xero_credentials.expires|naturaltime }}</td>
                </tr>
            </table>
        </div>
    </div>
</div>
